name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite
          coverage: pcov

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run unit tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Enforce 100% line coverage
        run: php bin/check-coverage.php coverage.xml 100

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging (placeholder)
        run: |
          echo "Tests passed. Deploy would run here (rsync or SSH git pull)."
          echo "Configure STAGING_SSH_KEY, STAGING_HOST, STAGING_USER (and optionally STAGING_PATH) in repo secrets, then replace this step with your deploy command."
